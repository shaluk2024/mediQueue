# ===================== SERVER =====================
server.port=8081

# ===================== APPLICATION =====================
spring.application.name=patient-service

# ===================== DATASOURCE =====================
spring.datasource.url=jdbc:postgresql://localhost:5432/mediqueue_patient
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

# ===================== JPA =====================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ===================== REDIS =====================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms

# ===================== CACHE =====================
spring.cache.type=redis
spring.cache.redis.time-to-live=300000
spring.cache.redis.cache-null-values=false

# ===================== KAFKA =====================
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3

# ===================== EUREKA =====================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# ===================== JWT =====================
jwt.secret=mediqueue-secret-key-must-be-at-least-256-bits-long-for-hs256
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# ===================== ACTUATOR =====================
management.endpoints.web.exposure.include=health,info,metrics
#management.tracing.sampling.probability=1.0
#management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans

# ===================== CUSTOM KAFKA TOPICS =====================
kafka.topics.appointment-booked=appointment.booked
kafka.topics.appointment-cancelled=appointment.cancelled
kafka.topics.queue-updated=queue.updated

# ===================== Flyway (for data migration) =====================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
logging.level.org.flywaydb=DEBUG
spring.flyway.user=postgres
spring.flyway.password=root
spring.flyway.url=jdbc:postgresql://localhost:5432/mediqueue_patient