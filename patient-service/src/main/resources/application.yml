# ===================== SERVER =====================
server:
  port: 8081

# ===================== APPLICATION =====================
spring:
  application:
    name: patient-service

  # ===================== DATASOURCE =====================
  datasource:
    url: jdbc:postgresql://localhost:5432/mediqueue_patient
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver

  # ===================== JPA =====================
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # ===================== REDIS =====================
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

  # ===================== CACHE =====================
  cache:
    type: redis
    redis:
      time-to-live: 300000
      cache-null-values: false

  # ===================== KAFKA =====================
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3

  # ===================== FLYWAY =====================
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    url: jdbc:postgresql://localhost:5432/mediqueue_patient
    user: postgres
    password: root

# ===================== EUREKA =====================
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

# ===================== JWT =====================
jwt:
  secret: mediqueue-secret-key-must-be-at-least-256-bits-long-for-hs256
  expiration: 86400000
  refresh-expiration: 604800000

# ===================== ACTUATOR =====================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  # tracing:
  #   sampling:
  #     probability: 1.0
  # zipkin:
  #   tracing:
  #     endpoint: http://localhost:9411/api/v2/spans

# ===================== KAFKA TOPICS =====================
kafka:
  topics:
    appointment-booked: appointment.booked
    appointment-cancelled: appointment.cancelled
    queue-updated: queue.updated

# ===================== API DOCS =====================
springdoc:
  api-docs:
    path: /patient-service/v3/api-docs
  swagger-ui:
    enabled: false

# ===================== LOGGING =====================
logging:
  level:
    org.flywaydb: DEBUG